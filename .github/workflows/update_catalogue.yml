name: Awesome Earth Observation Instruments

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download latest catalogue
        run: |
          curl --fail --location \
            https://raw.githubusercontent.com/awesome-spectral-indices/awesome-earth-observation-instruments/main/catalogue/catalogue.json \
            --output xeo/data/catalogue.json

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add xeo/data/catalogue.json

          if git diff --cached --quiet; then
            echo "Catalogue is already up to date."
          else
            today=$(date -u +"%Y-%m-%d %H:%M:%S")
            git commit -m "Updated Awesome Earth Observation Instruments Catalogue ${today} UTC"
            git push origin HEAD:main
          fi